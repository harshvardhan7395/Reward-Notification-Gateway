<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reward Notification Gateway — Demo</title>
  <script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; color: #f8fafc; }
    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 32px; }
    .card { background: #1a1a24; border: 1px solid #2d2d3d; border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; padding: 10px 14px; background: #0f0f13; border: 1px solid #2d2d3d; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: 11px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #4f46e5; }
    button:disabled { background: #2d2d3d; color: #64748b; cursor: not-allowed; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin-top: 16px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .dot.connected { background: #22c55e; }
    #log { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: #1a1a24; border: 1px solid #2d2d3d; border-radius: 10px; padding: 14px 16px; animation: slideIn 0.25s ease; }
    .toast.reward { border-color: #22c55e33; background: #0d1f12; }
    .toast-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .toast-event { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .toast-amount { font-size: 1.2rem; font-weight: 700; color: #22c55e; }
    .toast-desc { font-size: 0.88rem; color: #94a3b8; }
    .toast-time { font-size: 0.75rem; color: #475569; margin-top: 4px; }
    .empty { color: #475569; font-size: 0.88rem; text-align: center; padding: 24px 0; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .curl-box { background: #0f0f13; border: 1px solid #2d2d3d; border-radius: 8px; padding: 12px 14px; font-family: 'SF Mono', monospace; font-size: 0.78rem; color: #7dd3fc; word-break: break-all; margin-top: 12px; cursor: pointer; }
    .curl-box:hover { border-color: #6366f1; }
    .curl-label { font-size: 0.75rem; color: #64748b; margin-top: 12px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>Reward Notification Gateway</h1>
  <p class="subtitle">NestJS · WebSockets · Redis Pub/Sub</p>

  <div class="card">
    <label>User ID</label>
    <input id="userId" type="text" placeholder="e.g. user-42" value="user-42" />
    <button id="connectBtn" onclick="connect()">Connect</button>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Disconnected</span>
    </div>

    <div id="curlSection" style="display:none">
      <p class="curl-label">Trigger a reward (click to copy):</p>
      <div class="curl-box" id="curlBox" onclick="copyCurl()"></div>
    </div>
  </div>

  <div class="card">
    <label>Live Events</label>
    <ul id="log"><li class="empty">Connect to start receiving events…</li></ul>
  </div>

  <script>
    let socket = null;
    let currentUserId = null;

    async function connect() {
      const userId = document.getElementById('userId').value.trim();
      if (!userId) return;
      if (socket) { socket.disconnect(); }

      const res = await fetch(`/rewards/token?userId=${encodeURIComponent(userId)}`);
      const { token } = await res.json();
      currentUserId = userId;

      socket = io({ auth: { token } });

      socket.on('connect', () => {
        document.getElementById('dot').className = 'dot connected';
        document.getElementById('statusText').textContent = `Connected as ${userId}`;
        document.getElementById('connectBtn').textContent = 'Reconnect';
        document.getElementById('curlSection').style.display = 'block';
        updateCurl(userId);
      });

      socket.on('disconnect', () => {
        document.getElementById('dot').className = 'dot';
        document.getElementById('statusText').textContent = 'Disconnected';
      });

      socket.on('reward', (payload) => {
        addToast(payload);
      });
    }

    function updateCurl(userId) {
      const cmd = `curl -s -X POST http://localhost:3000/rewards/trigger \\\n  -H "Content-Type: application/json" \\\n  -d '{"userId":"${userId}","amount":50,"description":"Completed survey"}'`;
      document.getElementById('curlBox').textContent = cmd;
    }

    function copyCurl() {
      const text = document.getElementById('curlBox').textContent;
      navigator.clipboard.writeText(text.replace(/\\\n\s+/g, ' '));
      document.getElementById('curlBox').style.borderColor = '#22c55e';
      setTimeout(() => document.getElementById('curlBox').style.borderColor = '', 800);
    }

    function addToast(payload) {
      const log = document.getElementById('log');
      const empty = log.querySelector('.empty');
      if (empty) empty.remove();

      const li = document.createElement('li');
      li.className = 'toast reward';
      li.innerHTML = `
        <div class="toast-header">
          <span class="toast-event">reward</span>
          <span class="toast-amount">+${payload.amount} coins</span>
        </div>
        <div class="toast-desc">${payload.description}</div>
        <div class="toast-time">${payload.timestamp || new Date().toISOString()}</div>
      `;
      log.prepend(li);
    }
  </script>
</body>
</html>
